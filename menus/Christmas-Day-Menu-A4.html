<!-- ============================================================
     STYLES — edit below to change the design

<style>
:root {
  --rust: #8B3A1F;
  --rust-dark: #6B2A15;
  --forest: #2D4A2B;
  --charcoal: #1A1A1A;
  --grey: #5A5A5A;
  --grey-light: #8A8A8A;
  --cream: #FBF8F3;
  --rule: #D4C9B8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #E8E4DB;
  color: var(--charcoal);
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---------- A4 page container ---------- */
.menu-page {
  width: 210mm;
  min-height: 297mm;
  margin: 20px auto;
  padding: 8mm 14mm 8.5mm;
  background: transparent;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Decorative corner marks */
.menu-page::before,
.menu-page::after {
  content: '';
  position: absolute;
  width: 15mm;
  height: 15mm;
  border: 1px solid var(--rust);
  opacity: 0.25;
  pointer-events: none;
}
.menu-page::before {
  top: 8mm; left: 8mm;
  border-right: none; border-bottom: none;
}
.menu-page::after {
  bottom: 8mm; right: 8mm;
  border-left: none; border-top: none;
}

/* ---------- Watercolour tree, behind the menu body ---------- */
.tree-bg {
  position: absolute;
  top: 56mm;
  left: 50%;
  transform: translateX(-50%);
  width: 170mm;
  height: auto;
  opacity: 0.34;
  z-index: 0;
  pointer-events: none;
}

/* everything readable sits above the tree */
.page-header, .menu-body, .page-footer {
  position: relative;
  z-index: 1;
}

/* ========== HEADER ========== */
.page-header {
  text-align: center;
  padding-bottom: 1.2mm;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 1.2mm;
}

.header-flourish-top {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-size: 10pt;
  letter-spacing: 0.5em;
  color: var(--rust);
  font-weight: 500;
  margin-bottom: 1.2mm;
}

.fox-logo {
  display: block;
  margin: 0 auto -1.5mm;
  width: 17mm;
  height: auto;
}

.wordmark {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-weight: 700;
  font-size: 33pt;
  letter-spacing: 0.14em;
  color: var(--charcoal);
  line-height: 1;
  margin-bottom: 1.2mm;
}

.location {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-weight: 500;
  font-size: 11pt;
  letter-spacing: 0.4em;
  color: var(--grey);
  margin-bottom: 1.2mm;
}

.subtitle {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-weight: 600;
  font-size: 13pt;
  letter-spacing: 0.4em;
  color: var(--rust);
  margin-top: 1mm;
}

/* ---------- Offer line ---------- */
.offer {
  text-align: center;
  margin-bottom: 0.5mm;
}

.offer-headline {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-weight: 500;
  font-size: 14pt;
  color: var(--forest);
}

.offer-headline .dash {
  font-style: normal;
  color: var(--grey-light);
  margin: 0 6px;
}

.offer-headline .num {
  font-style: normal;
  font-weight: 700;
  font-size: 15pt;
  color: var(--rust);
  font-variant-numeric: tabular-nums;
}

.offer-headline .opt-sep {
  font-style: normal;
  color: var(--grey-light);
  margin: 0 14px;
}

.offer-terms {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-size: 9pt;
  letter-spacing: 0.14em;
  color: var(--grey);
  margin-top: 1mm;
}

.offer-included {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-size: 10.5pt;
  color: var(--forest);
  margin-top: 0.5mm;
}

.offer-perks {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-size: 10pt;
  color: var(--grey);
  margin-top: 0.5mm;
}

.finishers {
  text-align: center;
  padding-top: 1mm;
}

.finisher {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-size: 10pt;
  color: var(--grey);
  line-height: 1.35;
}

.finisher--lead {
  color: var(--forest);
  font-size: 11pt;
}

/* ========== MENU BODY ========== */
.menu-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
}

.section { padding: 0; }

.section-heading {
  text-align: center;
  margin-bottom: 1.6mm;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8mm;
}

.section-heading::before,
.section-heading::after {
  content: '';
  flex: 1;
  max-width: 60mm;
  height: 1px;
  background: var(--rust);
  opacity: 0.3;
}

.section-heading h2 {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-weight: 600;
  font-size: 12.5pt;
  letter-spacing: 0.4em;
  color: var(--rust);
  white-space: nowrap;
  flex-shrink: 0;
}

.section-note {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-size: 9.5pt;
  color: var(--grey);
  text-align: center;
  max-width: 150mm;
  margin: -0.5mm auto 1.5mm;
  line-height: 1.28;
}

.section-lines { text-align: center; }

.section-line {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-size: 10pt;
  color: var(--grey);
  line-height: 1.35;
}

/* ---------- Dishes — single centred column ---------- */
.dishes-one-col {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.dish {
  text-align: center;
  margin-bottom: 1.2mm;
}
.dish:last-child { margin-bottom: 0; }

.dish-name {
  display: block;
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-weight: 600;
  font-size: 11.5pt;
  color: var(--charcoal);
  letter-spacing: 0.01em;
  margin-bottom: 0.6mm;
}

.dish-desc {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-weight: 400;
  font-size: 9.5pt;
  color: var(--grey);
  line-height: 1.28;
  max-width: 152mm;
  margin: 0 auto;
}

/* ========== FOOTER ========== */
.page-footer {
  margin-top: 1.5mm;
  padding-top: 1.5mm;
  border-top: 1px solid var(--rule);
  text-align: center;
}

.footer-deposit {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-size: 8.5pt;
  color: var(--grey);
  max-width: 170mm;
  margin: 0 auto 1.2mm;
  line-height: 1.35;
}

.footer-allergy {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-style: italic;
  font-size: 9pt;
  color: var(--grey);
  margin-bottom: 1.5mm;
  max-width: 162mm;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.35;
}

.footer-contact {
  font-family: "Liberation Serif", "Times New Roman", Times, serif;
  font-size: 8pt;
  letter-spacing: 0.2em;
  color: var(--forest);
  font-weight: 500;
  line-height: 1.4;
}

.footer-contact .sep {
  margin: 0 8px;
  color: var(--grey-light);
  font-weight: 400;
}

/* ========== Print ========== */
@media print {
  @page {
    size: 210mm 297mm portrait;
    margin: 0;
  }
  html, body { background: transparent; }
  .menu-page {
    margin: 0;
    box-shadow: none;
    width: 210mm;
    min-height: 297mm;
    background: transparent;
  }
}
</style>
</head>

  <div class="offer">
    <div class="offer-headline" id="offer-headline"></div>
    <div class="offer-terms" id="offer-terms"></div>
  </div>

  <!-- MENU BODY -->
  <div class="menu-body" id="sections-root"></div>

  <!-- FOOTER -->
  <footer class="page-footer">
    <div class="footer-deposit" id="f-deposit"></div>
    <div class="footer-allergy" id="f-allergy"></div>
    <div class="footer-contact" id="f-contact"></div>
  </footer>

</article>

<script>
function renderDish(dish) {
  return `
    <div class="dish">
      <span class="dish-name">${dish.name}</span>
      ${dish.desc ? `<div class="dish-desc">${dish.desc}</div>` : ''}
    </div>
  `;
}

// Header
document.getElementById('h-flourish').textContent = MENU.header.flourish;
document.getElementById('h-wordmark').textContent = MENU.header.wordmark;
document.getElementById('h-location').textContent = MENU.header.location;
document.getElementById('h-subtitle').textContent = MENU.header.subtitle;

// Offer
document.getElementById('offer-headline').innerHTML =
  MENU.offer.options.map(o =>
    `${o.label}<span class="dash">—</span><span class="num">${o.price}</span>`
  ).join('<span class="opt-sep">·</span>');
const termsEl = document.getElementById('offer-terms');
if (MENU.offer.terms) { termsEl.textContent = MENU.offer.terms; } else { termsEl.remove(); }

// Sections
document.getElementById('sections-root').innerHTML = MENU.sections.map(sec => `
  <section class="section">
    <div class="section-heading"><h2>${sec.heading}</h2></div>
    ${sec.note ? `<div class="section-note">${sec.note}</div>` : ''}
    ${sec.lines ? `<div class="section-lines">${sec.lines.map(l => `<div class="section-line">${l}</div>`).join('')}</div>` : ''}
    ${sec.items ? `<div class="dishes-one-col">${sec.items.map(renderDish).join('')}</div>` : ''}
  </section>
`).join('');

// Footer
document.getElementById('f-deposit').textContent = MENU.footer.deposit || '';
document.getElementById('f-allergy').textContent = MENU.footer.allergyNote;
document.getElementById('f-contact').innerHTML =
  `${MENU.footer.address}<span class="sep">·</span>${MENU.footer.phone}<span class="sep">·</span>${MENU.footer.web}`;
</script>

</body>
</html>
