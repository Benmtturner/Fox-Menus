<style>
:root {
  --rust: #8B3A1F;
  --rust-dark: #6B2A15;
  --forest: #2D4A2B;
  --charcoal: #1A1A1A;
  --grey: #5A5A5A;
  --grey-light: #8A8A8A;
  --cream: #FBF8F3;
  --rule: #D4C9B8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: transparent;
  color: var(--charcoal);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---------- SRA4 page container (225 x 320mm) ---------- */
.menu-page {
  width: 225mm;
  min-height: 320mm;
  margin: 20px auto;
  padding: 12mm 18mm 8mm;
  background: transparent;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Decorative corner marks */
.menu-page::before,
.menu-page::after {
  content: '';
  position: absolute;
  width: 18mm;
  height: 18mm;
  border: 1px solid var(--rust);
  opacity: 0.25;
  pointer-events: none;
}
.menu-page::before {
  top: 9mm; left: 9mm;
  border-right: none; border-bottom: none;
}
.menu-page::after {
  bottom: 9mm; right: 9mm;
  border-left: none; border-top: none;
}

/* ========== HEADER ========== */
.page-header {
  text-align: center;
  padding-bottom: 6mm;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 7mm;
}

.header-flourish-top {
  font-family: 'Cormorant SC', serif;
  font-size: 8.5pt;
  letter-spacing: 0.5em;
  color: var(--rust);
  font-weight: 500;
  margin-bottom: 2mm;
}


.fox-logo {
  display: block;
  margin: 0 auto 1mm;
  width: 32mm;
  height: auto;
  /* multiply blend mode hides the white JPEG background against the cream page.
     If you replace the logo with a transparent PNG or SVG, remove this line. */
  mix-blend-mode: multiply;
}

.wordmark {
  font-family: 'Cormorant SC', serif;
  font-weight: 700;
  font-size: 54pt;
  letter-spacing: 0.14em;
  color: var(--charcoal);
  line-height: 1;
  margin-bottom: 3mm;
}

.location {
  font-family: 'Cormorant SC', serif;
  font-weight: 500;
  font-size: 11.5pt;
  letter-spacing: 0.4em;
  color: var(--grey);
  margin-bottom: 2.5mm;
}

.subtitle {
  font-family: 'Cormorant SC', serif;
  font-weight: 500;
  font-size: 8pt;
  letter-spacing: 0.4em;
  color: var(--grey-light);
  margin-top: 0;
}

/* ========== MENU BODY ========== */
.menu-body { flex: 1; }

.section { margin-bottom: 6mm; }
.section:last-child { margin-bottom: 0; }

.section-heading {
  text-align: center;
  margin-bottom: 4mm;
  position: relative;
}

.section-heading h2 {
  font-family: 'Cormorant SC', serif;
  font-weight: 600;
  font-size: 15pt;
  letter-spacing: 0.45em;
  color: var(--rust);
  display: inline-block;
  padding: 0 6mm;
  background: transparent;
  position: relative;
  z-index: 1;
}

.section-heading::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 1px;
  background: var(--rust);
  opacity: 0.3;
  z-index: 0;
}

/* ---------- Two column layout ---------- */
.dishes-two-col {
  column-count: 2;
  column-gap: 11mm;
}

.dishes-two-col .dish {
  break-inside: avoid;
  -webkit-column-break-inside: avoid;
  page-break-inside: avoid;
}

/* ---------- Dishes ---------- */
.dish {
  text-align: center;
  margin-bottom: 3.5mm;
}

.dish-name-price {
  display: inline-flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 1.5mm;
  white-space: nowrap;
}

.dish-name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 11.5pt;
  color: var(--charcoal);
  letter-spacing: 0.01em;
}

.dish-price {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 10.5pt;
  color: var(--rust);
  font-variant-numeric: tabular-nums;
  position: relative;
}

.dish-price::before {
  content: '·';
  position: absolute;
  left: -10px;
  color: var(--grey-light);
}

.dish-desc {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 8.5pt;
  color: var(--grey);
  line-height: 1.4;
  max-width: 83mm;
  margin: 0 auto;
}

.dish-note {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 7.5pt;
  color: var(--grey-light);
  margin-top: 1mm;
  letter-spacing: 0.02em;
}

/* ---------- Sides ---------- */
.sides {
  text-align: center;
  padding-top: 6mm;
  padding-bottom: 3mm;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}

.sides-heading-row {
  display: inline-flex;
  align-items: baseline;
  gap: 0;
  margin-bottom: 3mm;
}

.sides-heading {
  font-family: 'Cormorant SC', serif;
  font-weight: 600;
  font-size: 12pt;
  letter-spacing: 0.45em;
  color: var(--rust);
}

.sides-price-num {
  font-family: 'Cormorant Garamond', serif;
  font-style: normal;
  font-weight: 600;
  font-size: 10.5pt;
  color: var(--rust);
  font-variant-numeric: tabular-nums;
  margin-left: 14px;
}

.sides-list {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10pt;
  color: var(--charcoal);
  line-height: 2;
  max-width: 170mm;
  margin: 0 auto;
  text-align: center;
}

.sides-list .item {
  white-space: nowrap;
  display: inline-block;
}

.sides-list .sep {
  color: var(--grey-light);
  margin: 0 8px;
  display: inline-block;
}

/* ========== FOOTER ========== */
.page-footer {
  margin-top: 3mm;
  padding-top: 3mm;
  border-top: 1px solid var(--rule);
  text-align: center;
}

.footer-allergy {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 8pt;
  color: var(--grey);
  margin-bottom: 3mm;
  max-width: 140mm;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.4;
}

.footer-contact {
  font-family: 'Cormorant SC', serif;
  font-size: 7.5pt;
  letter-spacing: 0.2em;
  color: var(--forest);
  margin-bottom: 2mm;
  font-weight: 500;
  line-height: 1.8;
}

.footer-contact .sep {
  margin: 0 8px;
  color: var(--grey-light);
  font-weight: 400;
}

.footer-social {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 8.5pt;
  color: var(--rust);
}

/* ========== Print ========== */
@media print {
  @page {
    size: 225mm 320mm portrait;
    margin: 0;
  }
  html, body { background: white; }
  .menu-page {
    margin: 0;
    box-shadow: none;
    width: 225mm;
    height: 320mm;
    min-height: 0;
    padding-top: 10mm;
    padding-bottom: 6mm;
    overflow: hidden;
  }
  .section-heading h2 { background: transparent; }
}
</style>
</head>

  <!-- MENU BODY -->
  <div class="menu-body">

    <section class="section">
      <div class="section-heading"><h2>Starters</h2></div>
      <div class="dishes-two-col" id="starters-list"></div>
    </section>

    <section class="section">

      <div class="dishes-two-col" id="mains-list"></div>
    </section>

    <section class="sides">
      <div class="sides-heading-row">
        <span class="sides-heading">Sides</span>

      </div>

    <div class="footer-contact" id="f-contact"></div>
  </footer>

</article>

<script>
function renderDish(dish) {
  const noteHtml = dish.note ? `<div class="dish-note">${dish.note}</div>` : '';
  const priceHtml = dish.price ? `<span class="dish-price">${dish.price}</span>` : '';
  return `
    <div class="dish">
      <div class="dish-name-price">
        <span class="dish-name">${dish.name}</span>
        ${priceHtml}
      </div>
      <div class="dish-desc">${dish.desc}</div>
      ${noteHtml}
    </div>
  `;
}

// Header
document.getElementById('h-flourish').textContent = MENU.header.flourish;
document.getElementById('h-wordmark').textContent = MENU.header.wordmark;
document.getElementById('h-location').textContent = MENU.header.location;
document.getElementById('h-subtitle').textContent = MENU.header.subtitle;

// Dishes
document.getElementById('starters-list').innerHTML = MENU.starters.map(renderDish).join('');
document.getElementById('mains-list').innerHTML = MENU.mains.map(renderDish).join('');

// Sides
document.getElementById('sides-price').innerHTML = `<span class="sides-price-num">${MENU.sidesPrice}</span>`;
document.getElementById('sides-list').innerHTML =
  MENU.sides.map((s, i) => {
    const sep = i < MENU.sides.length - 1 ? '<span class="sep">·</span>' : '';
    return `<span class="item">${s}</span>${sep}`;
  }).join('');

// Footer
document.getElementById('f-allergy').textContent = MENU.footer.allergyNote;
document.getElementById('f-contact').innerHTML =
  `${MENU.footer.address}<br>${MENU.footer.phone}<span class="sep">·</span>${MENU.footer.web}`;
</script>

</body>
